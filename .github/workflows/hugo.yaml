name: Build and deploy jetten.ai

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

defaults:
  run:
    shell: bash

jobs:
  preflight:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Install exiftool (for image-metadata check)
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends libimage-exiftool-perl
      - name: Identity-leak preflight
        env:
          # Forbidden identity patterns (newline-separated). Set this secret on the
          # robojetten account to enable the CI name scan. Left unset on purpose to
          # keep the real name off GitHub entirely (see ALLOW_MISSING below).
          OPSEC_PATTERNS: ${{ secrets.OPSEC_PATTERNS }}
          # Deliberate opt-in: with OPSEC_PATTERNS unset, skip ONLY the name scan and
          # rely on the local pre-commit hook + the commit-identity check below.
          # Remove this line (and set OPSEC_PATTERNS) to make CI fail-closed on names.
          OPSEC_PATTERNS_ALLOW_MISSING: "1"
          # Validate the author/committer of every commit in the pushed range
          # (falls back to HEAD on first push / manual dispatch).
          PREFLIGHT_COMMIT_RANGE: ${{ github.event.before }}..${{ github.sha }}
        run: ./scripts/preflight.sh

  build:
    needs: preflight
    runs-on: ubuntu-latest
    env:
      HUGO_VERSION: 0.161.1
    steps:
      - name: Install Hugo CLI
        env:
          HUGO_VERSION: ${{ env.HUGO_VERSION }}
        run: |
          cd "$RUNNER_TEMP"
          deb="hugo_extended_${HUGO_VERSION}_linux-amd64.deb"
          base="https://github.com/gohugoio/hugo/releases/download/v${HUGO_VERSION}"
          wget -q "${base}/${deb}"
          wget -q "${base}/hugo_${HUGO_VERSION}_checksums.txt"
          # Verify integrity against the official checksums before running as root.
          grep " ${deb}$" "hugo_${HUGO_VERSION}_checksums.txt" | sha256sum -c -
          sudo dpkg -i "${deb}"
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0
      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v5
      - name: Build with Hugo
        env:
          HUGO_CACHEDIR: ${{ runner.temp }}/hugo_cache
          HUGO_ENVIRONMENT: production
          TZ: Europe/Amsterdam
          BASE_URL: ${{ steps.pages.outputs.base_url }}
        run: |
          hugo \
            --gc \
            --minify \
            --baseURL "$BASE_URL/"
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

  deploy:
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
