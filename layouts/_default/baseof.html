{{- $isHome := .IsHome -}}
<!doctype html>
<html lang="{{ .Site.Language.Lang | default "en" }}">
{{- partial "head.html" . }}
<body class="page page--{{ if $isHome }}home{{ else }}{{ .Section | default "page" }}{{ end }}">
  <a class="skip-link" href="#main">Skip to content</a>
  {{- partial "header.html" . }}
  <main id="main" class="main">
    {{- block "main" . }}{{ end }}
  </main>
  {{- partial "footer.html" . }}
</body>
</html>
